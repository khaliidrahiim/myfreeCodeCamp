<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="styles.css" rel="stylesheet">
  <title>Playing Cards</title>

</head>

<body>
  <header>
    <h1>Full House</h1>
  </header>
  <main id="playing-cards">
    <div class="card">
      <div class="left">
        <span>A</span>
        <span>♠</span>
      </div>
      <div class="middle">
        <span>♠</span>
      </div>
      <div class="right">
        <span class="flipped">♠</span>
        <span class="flipped">A</span>
      </div>
    </div>

    <div class="card">
      <div class="left">
        <span>A</span>
        <span>♣</span>
      </div>
      <div class="middle">
        <span>♣</span>
      </div>
      <div class="right">
        <span class="flipped">♣</span>
        <span class="flipped">A</span>
      </div>
    </div>

    <div class="card red">
      <div class="left">
        <span>A</span>
        <span>♦</span>
      </div>
      <div class="middle">
        <span>♦</span>
      </div>
      <div class="right">
        <span class="flipped">♦</span>
        <span class="flipped">A</span>
      </div>
    </div>

    <div class="card red">
      <div class="left">
        <span>2</span>
        <span>♥</span>
      </div>
      <div class="middle">
        <span>♥</span>
        <span class="flipped">♥</span>
      </div>
      <div class="right">
        <span class="flipped">♥</span>
        <span class="flipped">2</span>
      </div>
    </div>

    <div class="card">
      <div class="left">
        <span>2</span>
        <span>♦</span>
      </div>
      <div class="middle">
        <span>♦</span>
        <span class="flipped">♦</span>
      </div>
      <div class="right">
        <span class="flipped">♦</span>
        <span class="flipped">2</span>
      </div>
    </div>
  </main>
  <footer>
    <p>Three cards of the same rank with two cards of another same rank.</p>
  </footer>

</body>

</html>
