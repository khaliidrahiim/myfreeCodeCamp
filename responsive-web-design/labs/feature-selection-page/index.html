<!DOCTYPE html>
<html lang='en'>

<head>
  <meta charset='utf-8'>
  <title>Selection Feature Page</title>
  <link href='styles.css' rel='stylesheet'>
</head>

<body>
  <h1>Feature Selection</h1>

  <h2>Baserow: Open-source No-code Database</h2>

  <div class='feature-card-container'>
    <label class='feature-card'>
      <input type='checkbox'>
      <h3>Data Sovereignty</h3>
      <p>Open-source</p>
    </label>

    <label class='feature-card'>
      <input type='checkbox'>
      <h3>Ease of Use</h3>
      <p>No-code operation</p>
    </label>

    <label class='feature-card'>
      <input type='checkbox'>
      <h3>Replaces Excel</h3>
      <p>Spreadsheet import/export</p>
    </label>

    <label class='feature-card'>
      <input type='checkbox'>
      <h3>Data Management</h3>
      <p>Scales to environmental inventories & environmental monitoring expansion</p>
    </label>
  </div>
</body>

</html>
