<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="styles.css">
  <title>Document</title>
</head>

<body>
  <div class="container">
    <form>
      <fieldset>
        <legend>Personal Information</legend>

        <label for="name">Full Name:</label>
        <input type="text" id="name" name="name">

        <label for="email">Email:</label>
        <input type="email" id="email" name="email">
      </fieldset>

      <fieldset>
        <legend>Job Preferences</legend>

        <label for="position">Position:</label>
        <select id="position" name="position">
          <option value="frontend">Frontend Developer</option>
          <option value="backend">Backend Developer</option>
          <option value="fullstack">Full Stack Developer</option>
        </select>
      </fieldset>

      <fieldset class="radio-group">
        <legend>Job Type</legend>

        <input type="radio" name="availability" value="full-time" id="full-time">
        <label for="full-time">Full-time</label>
        <input type="radio" name="availability" value="part-time" id="part-time">
        <label for="part-time">Part-time</label>
      </fieldset>

      <fieldset>
        <legend>Additional Information</legend>

        <label for="message">Message:</label>
        <textarea id="message" name="message" placeholder="Tell us more about yourself...">
        </textarea>
      </fieldset>

      <button type="submit">Submit Application</button>
    </form>
  </div>
</body>

</html>
